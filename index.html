<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ridhaa Love Verification Portal ❤️</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    overflow:hidden;
    text-align:center;
    color:#fff;
}

.container{
    margin-top:100px;
    padding:20px;
}

.card{
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(10px);
    padding:30px;
    border-radius:20px;
    max-width:600px;
    margin:auto;
}

button{
    padding:12px 25px;
    font-size:18px;
    border:none;
    border-radius:30px;
    cursor:pointer;
    margin:10px;
}

.yesBtn{
    position:absolute;
    background:#ff4081;
    color:white;
}

.noBtn{
    background:white;
    color:#ff4081;
}

h1,h2,h3{
    margin-bottom:20px;
}

.heart{
    position:absolute;
    color:white;
    animation:float 8s linear infinite;
}

@keyframes float{
    from{
        transform:translateY(100vh);
        opacity:1;
    }
    to{
        transform:translateY(-100px);
        opacity:0;
    }
}
</style>
</head>
<body>

<div class="container" id="main">

        <button onclick="startTest()">Enter Secure Portal ❤️</button>
    </div>
</div>

<script>

for(let i=0;i<25;i++){
    let heart=document.createElement("div");
    heart.className="heart";
    heart.innerHTML="❤️";
    heart.style.left=Math.random()*100+"vw";
    heart.style.fontSize=(20+Math.random()*30)+"px";
    heart.style.animationDuration=(5+Math.random()*5)+"s";
    document.body.appendChild(heart);

let count=0;

setTimeout(()=>{

yes.style.top="55%";

count++;

let maxY=window.innerHeight-80;

yes.style.left=Math.random()*maxX+"px";
yes.style.top=Math.random()*maxY+"px";

"⚠️ Suspicious activity detected. Ridhaa is avoiding YES.";
}

"🤖 AI concludes: Love level increasing rapidly.";
}

}

}

i++;
